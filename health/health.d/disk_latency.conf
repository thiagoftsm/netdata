template: very_slow_disk_io
      on: disk.latency
  lookup: sum -5s foreach 524ms->1s 
   units: calls
  plugin: ebpf.plugin
   every: 10s
    warn: $this > 100
    crit: $this > 500
   delay: down 10m multiplier 1.5 max 1h
    info: Latency information for hard disks. This alarm needs to be ajusted according factory specification.
      to: sysadmin
